site:
  name: QuickToolFlow
  site: 'https://quicktoolflow.com'
  base: '/'
  trailingSlash: ignore
  googleSiteVerificationId: ''

metadata:
  title:
    default: QuickToolFlow — Free Online Developer & Productivity Tools
    template: '%s — QuickToolFlow'
  description: >-
    Fast, free, privacy-first online tools for developers.
    JSON formatter, password generator, word counter, Base64 encoder, and more.
    No sign-up required.
  robots:
    index: true
    follow: true
  openGraph:
    type: website
    locale: en_US
    image:
      src: '~/assets/images/default.png'
      alt: QuickToolFlow

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6
    post:
      isEnabled: false
      permalink: '/blog/%slug%'
      robots:
        index: false
        follow: false
    list:
      isEnabled: false
      robots:
        index: false
        follow: false
    category:
      isEnabled: false
      robots:
        index: false
        follow: false
    tag:
      isEnabled: false
      robots:
        index: false
        follow: false

analytics:
  vendors:
    googleAnalytics:
      id: ''

ui:
  theme: system
