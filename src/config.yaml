site:
  name: QuickToolFlow
  site: 'https://quicktoolflow.com'
  base: '/'
  trailingSlash: ignore
  googleSiteVerificationId: ''

metadata:
  title:
    default: QuickToolFlow - Free Online Developer & Productivity Tools
    template: '%s - QuickToolFlow'
  description: >-
    Fast, free, privacy-first online tools for developers.
    JSON formatter, password generator, word counter, Base64 encoder, and more.
    No sign-up required.
  robots:
    index: true
    follow: true
  openGraph:
    type: website
    locale: en_US
    image:
      src: '~/assets/images/default.png'
      alt: QuickToolFlow

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 9
    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
        follow: true
    category:
      isEnabled: true
      pathname: 'blog/category'
      robots:
        index: true
        follow: true
    tag:
      isEnabled: false
      robots:
        index: false
        follow: false

analytics:
  vendors:
    googleAnalytics:
      id: 'G-YQYEH856F7'
      partytown: false
    googleAdsense:
      clientId: ''
      slots:
        homepage: ''
        toolsDirectory: ''
        toolMiddle: ''
        toolBottom: ''
        blogBottom: ''

ui:
  theme: system
